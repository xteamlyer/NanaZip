name: Build Binaries

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      POWERSHELL_TELEMETRY_OPTOUT: 1
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        
    - uses: microsoft/setup-msbuild@v2
    
    - name: Clear local NuGet cache (workaround for failed restores on windows-latest)
      run: dotnet nuget locals all --clear
      
    - name: Build
      run: MSBuild -binaryLogger:Output\BuildAllTargets.binlog -m BuildAllTargets.proj
      
    - name: Decode signing certificate (PFX)
      shell: pwsh
      run: |
        $certBytes = [System.Convert]::FromBase64String("${{ secrets.SIGN_CERT }}")
        Set-Content -Path signing_cert.pfx -Value $certBytes -AsByteStream

    - name: Extract CER from PFX
      shell: pwsh
      run: |
        $password = ConvertTo-SecureString "${{ secrets.SIGN_CERT_PASSWORD }}" -AsPlainText -Force
        $pfx = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2("signing_cert.pfx", $password)
        Export-Certificate -Cert $pfx -FilePath signing_cert.cer

    - name: Sign MSIX
      shell: pwsh
      run: |
        $bundle = Get-ChildItem -Path "Output/Binaries/AppPackages" -Filter "*.msixbundle" -Recurse | Select-Object -First 1
        if (-not $bundle) { throw "MSIX bundle not found!" }

        $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
          Where-Object { $_.FullName -match '\\x64\\' -and $_.FullName -notmatch '\\arm' -and $_.FullName -notmatch '\\arm64' } |
          Sort-Object FullName -Descending |
          Select-Object -First 1

        if (-not $signtool) { throw "signtool.exe not found!" }

        & $signtool.FullName sign `
          /fd SHA256 `
          /f signing_cert.pfx `
          /p "${{ secrets.SIGN_CERT_PASSWORD }}" `
          /v $bundle.FullName

    - name: Upload CER certificate
      uses: actions/upload-artifact@v4
      with:
        name: signing-cert
        path: signing_cert.cer
        
    - name: Upload MSIX Bundle
      uses: actions/upload-artifact@v4
      with:
        name: NanaZip_Mainline_ApplicationPackages
        path: Output/Binaries/AppPackages
        
    - name: Upload Extension Package Installer
      uses: actions/upload-artifact@v4
      with:
        name: NanaZip_Mainline_ExtensionPackageInstaller
        path: Output/NanaZip.ExtensionPackage_*.exe
        
    - name: Upload MSBuild Build Process Binary Log
      uses: actions/upload-artifact@v4
      if: '!cancelled()'
      with:
        name: NanaZip_Mainline_BuildBinaryLog
        path: Output/BuildAllTargets.binlog
