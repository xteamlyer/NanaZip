name: Build Binaries

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      POWERSHELL_TELEMETRY_OPTOUT: 1
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        
    - uses: microsoft/setup-msbuild@v2
    
    - name: Clear local NuGet cache (workaround for failed restores on windows-latest)
      run: dotnet nuget locals all --clear
      
    - name: Build
      run: MSBuild -binaryLogger:Output\BuildAllTargets.binlog -m BuildAllTargets.proj
      
    - name: Decode and import signing certificate
      run: |
        echo "${{ secrets.SIGN_CERT }}" | base64 -d > signing_cert.pfx
        Import-PfxCertificate -FilePath signing_cert.pfx `
          -Password (ConvertTo-SecureString -String "${{ secrets.SIGN_CERT_PASSWORD }}" -AsPlainText -Force) `
          -CertStoreLocation Cert:\CurrentUser\My
      shell: pwsh

    - name: Sign MSIX Bundle
      run: |
        $bundle = Get-ChildItem -Path "Output/Binaries/AppPackages" -Filter "*.msixbundle" -Recurse | Select-Object -First 1
        & "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe" sign `
          /fd SHA256 /a `
          /f signing_cert.pfx /p "${{ secrets.SIGN_CERT_PASSWORD }}" `
          $bundle.FullName
      shell: pwsh
      
    - name: Upload MSIX Bundle
      uses: actions/upload-artifact@v4
      with:
        name: NanaZip_Mainline_ApplicationPackages
        path: Output/Binaries/AppPackages
        
    - name: Upload Extension Package Installer
      uses: actions/upload-artifact@v4
      with:
        name: NanaZip_Mainline_ExtensionPackageInstaller
        path: Output/NanaZip.ExtensionPackage_*.exe
        
    - name: Upload MSBuild Build Process Binary Log
      uses: actions/upload-artifact@v4
      if: '!cancelled()'
      with:
        name: NanaZip_Mainline_BuildBinaryLog
        path: Output/BuildAllTargets.binlog
